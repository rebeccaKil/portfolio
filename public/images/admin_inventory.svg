<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">인벤토리 콘텐츠 관리 화면</title>
  <desc id="desc">인벤토리 콘텐츠 관리 목록, 등록 모달, 인벤토리 속성 필드를 표현한 화면 이미지</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #30343b; }
    .muted { fill: #737b85; }
    .label { font-size: 17px; font-weight: 800; }
    .body { font-size: 16px; font-weight: 700; }
    .small { font-size: 12px; font-weight: 800; }
    .title { font-size: 26px; font-weight: 900; }
    .field { fill: #fff; stroke: #d4d8dd; stroke-width: 1.5; }
    .line { stroke: #e3e6ea; stroke-width: 1; }
    .btn-blue { fill: #2f78b7; }
    .btn-green { fill: #45a049; }
    .btn-red { fill: #c9423d; }
  </style>
  <rect width="1200" height="720" fill="#f7f9fb"/>
  <text x="36" y="54" class="title">인벤토리 콘텐츠 관리</text>
  <line x1="36" y1="82" x2="1164" y2="82" class="line"/>
  <text x="156" y="126" class="label">브랜드</text>
  <rect x="225" y="102" width="170" height="42" class="field"/>
  <text x="248" y="129" class="body muted">전체</text>
  <text x="142" y="184" class="label">카테고리</text>
  <text x="225" y="184" class="body">☑ 전체  ☑ 공통  ☑ 항공  ☑ 호텔  ☑ 투액  ☑ 전문관  ☑ 패키지</text>
  <text x="142" y="248" class="label">사용여부</text>
  <text x="225" y="248" class="body">◉ 전체  ○ 전시  ○ 비전시</text>
  <text x="120" y="310" class="label">인벤토리 속성</text>
  <rect x="225" y="286" width="360" height="42" class="field"/>
  <text x="248" y="313" class="body muted">전체</text>
  <text x="142" y="370" class="label">제목 검색</text>
  <rect x="225" y="346" width="360" height="42" class="field"/>
  <rect x="510" y="426" width="58" height="42" rx="4" class="btn-blue"/>
  <text x="528" y="453" class="body" fill="#fff">초기화</text>
  <rect x="592" y="426" width="58" height="42" rx="4" class="btn-green"/>
  <text x="610" y="453" class="body" fill="#fff">검색</text>
  <rect x="674" y="426" width="58" height="42" rx="4" class="btn-red"/>
  <text x="692" y="453" class="body" fill="#fff">등록</text>
  <line x1="36" y1="510" x2="1164" y2="510" class="line"/>
  <text x="66" y="548" class="body muted">총 896개의 결과값이 있습니다.</text>
  <rect x="50" y="578" width="1100" height="100" fill="#fff" stroke="#e3e6ea"/>
  <rect x="50" y="578" width="1100" height="38" fill="#f1f3f5"/>
  <text x="75" y="602" class="small">No.</text>
  <text x="140" y="602" class="small">번호</text>
  <text x="300" y="602" class="small">제목</text>
  <text x="610" y="602" class="small">국가/도시</text>
  <g filter="url(#shadow)">
    <rect x="112" y="330" width="876" height="370" rx="12" fill="#fff"/>
    <rect x="112" y="330" width="876" height="48" rx="12" fill="#202225"/>
    <rect x="112" y="378" width="876" height="54" fill="#253942"/>
    <text x="550" y="358" text-anchor="middle" class="small" fill="#fff">인벤토리 콘텐츠 관리</text>
    <text x="132" y="413" class="title" fill="#fff">인벤토리 콘텐츠 관리</text>
    <text x="930" y="413" class="body" fill="#fff">Close</text>
    <text x="132" y="476" class="title">인벤토리 속성</text>
    <line x1="132" y1="500" x2="968" y2="500" class="line"/>
    <text x="214" y="552" class="label">브랜드*</text>
    <rect x="294" y="528" width="270" height="42" class="field"/>
    <text x="316" y="555" class="body muted">투어비스</text>
    <text x="190" y="612" class="label">카테고리*</text>
    <text x="294" y="612" class="body">○ 공통  ○ 항공  ◉ 호텔  ○ 투액  ○ 전문관  ○ 패키지</text>
    <text x="170" y="672" class="label">인벤토리 속성</text>
    <rect x="294" y="648" width="270" height="42" class="field"/>
    <text x="316" y="675" class="body muted">호텔 상품 상세 AD</text>
  </g>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#1c242b" flood-opacity="0.28"/>
    </filter>
  </defs>
</svg>
